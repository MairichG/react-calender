<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task-Manager v0.2 — 2-week Planner</title>
  <style>
    :root{
      --bg0:#050608;
      --bg1:#080a0f;
      --card:#0e121a;
      --card2:#0c1016;
      --stroke:rgba(255,255,255,.08);
      --stroke2:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.55);
      --muted2:rgba(255,255,255,.35);
      --blue:#1aa3ff;
      --blue2:#48b4ff;
      --red:#ff3b3b;
      --green:#3dff8a;
      --shadow: 0 20px 60px rgba(0,0,0,.55);
      --radius:18px;
      --radius2:14px;
      --gap:16px;
      --colW: 300px;
      --sidebarW: 72px;
      --topH: 76px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:var(--font);
      background:
        radial-gradient(1200px 700px at 20% 15%, rgba(26,163,255,.18), transparent 55%),
        radial-gradient(900px 600px at 80% 30%, rgba(255,59,59,.08), transparent 55%),
        radial-gradient(700px 500px at 50% 90%, rgba(61,255,138,.06), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow:hidden;
    }

    /* Layout */
    .app{
      height:100%;
      display:grid;
      grid-template-columns: var(--sidebarW) 1fr;
    }

    /* Sidebar */
    .sidebar{
      padding:14px 10px;
      border-right:1px solid var(--stroke);
      background: rgba(255,255,255,.02);
      backdrop-filter: blur(10px);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }
    .avatar{
      width:40px;height:40px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), rgba(255,255,255,.04));
      border:1px solid var(--stroke2);
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      display:grid;place-items:center;
      overflow:hidden;
    }
    .avatar svg{opacity:.9}
    .nav{
      margin-top:6px;
      width:100%;
      display:flex;flex-direction:column;
      gap:10px;
      align-items:center;
    }
    .navbtn{
      width:44px;height:44px;border-radius:14px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.02);
      display:grid;place-items:center;
      cursor:pointer;
      transition: .15s ease;
      user-select:none;
    }
    .navbtn:hover{border-color:var(--stroke2); transform: translateY(-1px)}
    .navbtn.active{
      border-color: rgba(26,163,255,.55);
      background: rgba(26,163,255,.10);
      box-shadow: 0 12px 35px rgba(26,163,255,.10);
    }
    .navbtn svg{opacity:.85}
    .spacer{flex:1}
    .mini{
      font-size:12px;color:var(--muted2);
      text-align:center; line-height:1.25;
      padding:6px 0;
    }

    /* Main */
    .main{
      height:100%;
      display:grid;
      grid-template-rows: var(--topH) 1fr;
      overflow:hidden;
    }

    /* Topbar */
    .topbar{
      display:flex;align-items:center;
      gap:14px;
      padding: 16px 18px;
    }
    .title{
      display:flex;align-items:baseline;gap:10px;
      min-width: 240px;
    }
    .title h1{
      margin:0;font-size:28px;letter-spacing:.2px;
      font-weight:750;
    }
    .title .ver{
      font-size:14px;color:var(--muted2);
      font-weight:600;
      transform: translateY(-2px);
    }

    .tabs{
      display:flex; gap:10px; align-items:center;
      margin-left: 8px;
    }
    .tab{
      font-size:14px;
      color:var(--muted);
      padding:8px 10px;
      border-radius: 12px;
      cursor:pointer;
      border:1px solid transparent;
      user-select:none;
    }
    .tab.active{
      color:var(--text);
      border-color: var(--stroke);
      background: rgba(255,255,255,.02);
    }

    .controls{display:flex;align-items:center;gap:10px;margin-left:auto}
    .chip{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.02);
      cursor:pointer;
      user-select:none;
      transition:.15s ease;
    }
    .chip:hover{border-color:var(--stroke2); transform: translateY(-1px)}
    .chip span{font-size:14px;color:var(--text);font-weight:650}
    .chip small{color:var(--muted);font-size:12px;font-weight:600}
    .chip svg{opacity:.85}

    /* Board */
    .boardWrap{
      height:100%;
      padding: 8px 18px 18px;
      overflow:hidden;
    }
    .board{
      height:100%;
      display:flex;
      gap: var(--gap);
      overflow:auto;
      padding-bottom: 12px;
      scroll-behavior:smooth;
    }
    .board::-webkit-scrollbar{height:10px}
    .board::-webkit-scrollbar-track{background: rgba(255,255,255,.03); border-radius:999px}
    .board::-webkit-scrollbar-thumb{background: rgba(255,255,255,.10); border-radius:999px}
    .board::-webkit-scrollbar-thumb:hover{background: rgba(255,255,255,.16)}

    .col{
      width: var(--colW);
      min-width: var(--colW);
      background: rgba(255,255,255,.02);
      border:1px solid var(--stroke);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      position:relative;
    }
    .col::before{
      content:"";
      position:absolute; inset:0;
      border-radius: 22px;
      background: radial-gradient(400px 220px at 30% 0%, rgba(26,163,255,.10), transparent 60%);
      pointer-events:none;
    }

    .colHeader{
      display:flex; align-items:center; gap:10px;
      padding: 4px 6px 0;
      position:relative;
      z-index:1;
    }
    .accent{
      width:4px;height:18px;border-radius:999px;background: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,163,255,.12);
    }
    .dayName{
      font-weight:800;
      font-size:15px;
      letter-spacing:.2px;
    }
    .dayDate{
      margin-left:auto;
      font-size:12px;color:var(--muted2);
      font-weight:650;
    }
    .plusBtn{
      width:28px;height:28px;border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.02);
      display:grid;place-items:center;
      cursor:pointer;
      transition:.15s ease;
    }
    .plusBtn:hover{border-color:var(--stroke2); transform: translateY(-1px)}
    .plusBtn svg{opacity:.75}

    .summary{
      position:relative;z-index:1;
      padding: 0 6px 4px;
      display:flex;flex-direction:column;gap:8px;
    }
    .meterRow{
      display:flex;align-items:center;gap:10px;
    }
    .meter{
      height:6px;border-radius:999px;
      background: rgba(255,255,255,.07);
      flex:1;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
    }
    .meter > i{
      display:block;height:100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), rgba(72,180,255,.9));
      border-radius:999px;
    }
    .stat{
      font-size:12px; color:var(--muted);
      font-weight:650;
      min-width: 92px;
      text-align:right;
    }
    .summaryLine{
      display:flex; gap:10px; align-items:center;
      font-size:12px; color:var(--muted);
      font-weight:650;
    }
    .badge{
      font-size:11px;
      padding: 4px 8px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-weight:700;
    }
    .badge.good{border-color: rgba(61,255,138,.25); color: rgba(61,255,138,.85); background: rgba(61,255,138,.06)}
    .badge.warn{border-color: rgba(255,59,59,.22); color: rgba(255,59,59,.85); background: rgba(255,59,59,.06)}
    .badge.neutral{border-color: rgba(26,163,255,.20); color: rgba(72,180,255,.9); background: rgba(26,163,255,.06)}

    .cards{
      position:relative;z-index:1;
      display:flex;
      flex-direction:column;
      gap: 10px;
      overflow:auto;
      padding-right: 4px;
    }
    .cards::-webkit-scrollbar{width:8px}
    .cards::-webkit-scrollbar-track{background: transparent}
    .cards::-webkit-scrollbar-thumb{background: rgba(255,255,255,.10); border-radius:999px}
    .cards::-webkit-scrollbar-thumb:hover{background: rgba(255,255,255,.16)}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid var(--stroke);
      border-radius: 18px;
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap: 10px;
      box-shadow: 0 14px 30px rgba(0,0,0,.38);
    }
    .cardTop{
      display:flex; align-items:flex-start; gap:10px;
    }
    .cardTitle{
      font-weight:850;
      font-size:15px;
      line-height:1.2;
    }
    .cardMeta{
      margin-left:auto;
      font-size:12px;color:var(--muted);
      font-weight:700;
      white-space:nowrap;
    }
    .miniBar{
      height:5px;border-radius:999px;background: rgba(255,255,255,.07);
      overflow:hidden;border:1px solid rgba(255,255,255,.06);
    }
    .miniBar > i{
      display:block;height:100%;width:0%;
      background: linear-gradient(90deg, rgba(26,163,255,.95), rgba(72,180,255,.85));
      border-radius:999px;
    }
    .tagRow{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .tag{
      font-size:11px;
      padding: 5px 8px;
      border-radius: 10px;
      border:1px solid rgba(255,59,59,.20);
      background: rgba(255,59,59,.08);
      color: rgba(255,150,150,.95);
      font-weight:750;
    }
    .tag.blue{
      border-color: rgba(26,163,255,.22);
      background: rgba(26,163,255,.08);
      color: rgba(150,220,255,.95);
    }
    .tag.gray{
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-weight:700;
    }

    .desc{
      font-size:12px;color:var(--muted2);
      line-height:1.35;
    }

    .actions{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      margin-top: 2px;
    }
    .btn{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.02);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      font-size:12px;
      font-weight:750;
      cursor:pointer;
      transition:.15s ease;
      user-select:none;
    }
    .btn:hover{border-color:var(--stroke2); transform: translateY(-1px)}
    .btn.danger{border-color: rgba(255,59,59,.25); color: rgba(255,160,160,.95)}
    .btn.ok{border-color: rgba(61,255,138,.25); color: rgba(160,255,200,.95)}
    .btn.ghost{background: transparent}
    .btn.icon{
      padding:8px;
      display:grid; place-items:center;
      width:34px; height:34px;
    }

    .range{
      width:100%;
      accent-color: var(--blue);
    }

    /* Modal */
    .modalOverlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index:999;
    }
    .modal{
      width:min(760px, 100%);
      background: rgba(12,16,22,.90);
      border:1px solid var(--stroke2);
      border-radius: 22px;
      box-shadow: 0 30px 90px rgba(0,0,0,.75);
      backdrop-filter: blur(14px);
      overflow:hidden;
    }
    .modalHead{
      padding: 14px 16px;
      display:flex; align-items:center; gap:12px;
      border-bottom:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent);
    }
    .modalHead h2{margin:0;font-size:16px;font-weight:850}
    .modalHead .close{
      margin-left:auto;
      width:36px;height:36px;border-radius:12px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.02);
      display:grid;place-items:center;
      cursor:pointer;
    }
    .modalBody{
      padding: 14px 16px 16px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field{
      display:flex; flex-direction:column; gap:6px;
    }
    .field label{
      font-size:12px; color:var(--muted);
      font-weight:750;
    }
    .field input, .field select, .field textarea{
      width:100%;
      background: rgba(255,255,255,.03);
      border:1px solid var(--stroke);
      border-radius: 14px;
      padding: 10px 12px;
      color: var(--text);
      font-size:14px;
      outline:none;
    }
    .field textarea{min-height: 76px; resize: vertical; grid-column: 1 / -1;}
    .modalFoot{
      padding: 12px 16px 16px;
      display:flex; gap:10px; justify-content:flex-end; align-items:center;
    }
    .hint{
      margin-right:auto;
      font-size:12px; color:var(--muted2);
      line-height:1.25;
    }
    .mono{font-variant-numeric: tabular-nums; font-feature-settings:"tnum" 1}

    /* Small screens */
    @media (max-width: 820px){
      :root{--colW: 280px}
      .title{min-width: 200px}
      .modalBody{grid-template-columns: 1fr}
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="avatar" title="Profile">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M12 12c2.485 0 4.5-2.239 4.5-5s-2.015-5-4.5-5S7.5 4.239 7.5 7s2.015 5 4.5 5Z" stroke="rgba(255,255,255,.75)" stroke-width="1.6"/>
          <path d="M20 21c0-4.2-3.582-7-8-7s-8 2.8-8 7" stroke="rgba(255,255,255,.75)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="nav">
        <div class="navbtn active" data-nav="calendar" title="Calendar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M8 2v3M16 2v3" stroke="rgba(255,255,255,.8)" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M3.5 9h17" stroke="rgba(255,255,255,.6)" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M6.5 5h11c2 0 3 1 3 3v12c0 2-1 3-3 3h-11c-2 0-3-1-3-3V8c0-2 1-3 3-3Z"
                  stroke="rgba(255,255,255,.8)" stroke-width="1.6" />
          </svg>
        </div>
        <div class="navbtn" data-nav="home" title="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 10.5 12 3l8 7.5V21a1.8 1.8 0 0 1-1.8 1.8H5.8A1.8 1.8 0 0 1 4 21v-10.5Z"
                  stroke="rgba(255,255,255,.75)" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M9.5 22v-7h5v7" stroke="rgba(255,255,255,.55)" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="navbtn" data-nav="list" title="List">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M7 7h14M7 12h14M7 17h14" stroke="rgba(255,255,255,.75)" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M3.5 7h.01M3.5 12h.01M3.5 17h.01" stroke="rgba(255,255,255,.75)" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="mini">Local<br/>storage</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title">
          <h1>Task-Manager</h1>
          <div class="ver">v0.2</div>
        </div>

        <div class="tabs">
          <div class="tab" id="tabRows">Rows</div>
          <div class="tab active" id="tabCols">Columns</div>
          <div class="tab" id="tabTable">Table</div>
        </div>

        <div class="controls">
          <div class="chip" id="btnFilters">
            <span>Filters</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 7h10M18 7h2M4 17h2M10 17h10" stroke="rgba(255,255,255,.8)" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M14 7a2 2 0 1 0 4 0 2 2 0 0 0-4 0ZM6 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"
                    stroke="rgba(255,255,255,.6)" stroke-width="1.6"/>
            </svg>
          </div>
          <div class="chip" id="btnSort">
            <span>Sort</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M7 4v16" stroke="rgba(255,255,255,.8)" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M4 7 7 4l3 3" stroke="rgba(255,255,255,.6)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M17 20V4" stroke="rgba(255,255,255,.8)" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M14 17 17 20l3-3" stroke="rgba(255,255,255,.6)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="chip" id="btnSettings">
            <span>Settings</span>
            <small class="mono" id="rangeLabel">14d</small>
          </div>
        </div>
      </header>

      <section class="boardWrap">
        <div class="board" id="board"></div>
      </section>
    </main>
  </div>

  <!-- Modal: Add/Edit task -->
  <div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalHead">
        <h2 id="modalTitle">Add task</h2>
        <div class="close" id="modalClose" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M7 7l10 10M17 7 7 17" stroke="rgba(255,255,255,.8)" stroke-width="1.9" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="modalBody">
        <div class="field">
          <label>Title</label>
          <input id="fTitle" placeholder="Например: Сделать дз по физике" />
        </div>

        <div class="field">
          <label>Due date</label>
          <input id="fDue" type="date" />
        </div>

        <div class="field">
          <label>Required hours</label>
          <input id="fReq" type="number" min="0" step="0.25" value="1.5" />
        </div>

        <div class="field">
          <label>Progress (hours done)</label>
          <input id="fDone" type="number" min="0" step="0.25" value="0" />
        </div>

        <div class="field">
          <label>Tag</label>
          <input id="fTag" placeholder="Homework / Project / etc" />
        </div>

        <div class="field">
          <label>Type</label>
          <select id="fType">
            <option value="mandatory">Mandatory</option>
            <option value="optional">Optional</option>
          </select>
        </div>

        <div class="field" style="grid-column:1/-1;">
          <label>Description</label>
          <textarea id="fDesc" placeholder="Коротко что сделать"></textarea>
        </div>
      </div>

      <div class="modalFoot">
        <div class="hint">
          Mandatory задачи участвуют в расчёте “обязательных часов” и “свободных часов”.
        </div>
        <button class="btn ghost" id="btnCancel">Cancel</button>
        <button class="btn ok" id="btnSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Settings -->
  <div class="modalOverlay" id="settingsOverlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalHead">
        <h2>Settings</h2>
        <div class="close" id="settingsClose" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M7 7l10 10M17 7 7 17" stroke="rgba(255,255,255,.8)" stroke-width="1.9" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="modalBody">
        <div class="field">
          <label>Days to show</label>
          <input id="sRange" type="number" min="7" max="60" step="1" value="14"/>
        </div>
        <div class="field">
          <label>Default daily capacity (hours)</label>
          <input id="sDefaultCap" type="number" min="0" step="0.25" value="3"/>
        </div>

        <div class="field" style="grid-column:1/-1;">
          <label>Per-day capacity overrides (optional)</label>
          <textarea id="sOverrides" placeholder="Формат: YYYY-MM-DD=2.5, YYYY-MM-DD=4&#10;например: 2026-01-06=2, 2026-01-07=3.5"></textarea>
        </div>
      </div>

      <div class="modalFoot">
        <div class="hint">
          Capacity = “сколько часов ты реально можешь уделить боту” в этот день.
        </div>
        <button class="btn ghost" id="sReset">Reset data</button>
        <button class="btn" id="sCancel">Cancel</button>
        <button class="btn ok" id="sSave">Save</button>
      </div>
    </div>
  </div>

<script>
/**
 * Идея расчёта (как ты описал):
 * На каждый день есть capacity (сколько часов доступно).
 * Есть задачи Mandatory, у каждой dueDate и requiredHours и doneHours.
 *
 * Для дня D показываем:
 *   mandatoryRemainingByD = сумма остатка (required - done) по mandatory задачам, у которых dueDate <= D.
 *   totalCapacityUpToD = сумма capacity по дням от startDate до D.
 *   freeHoursUpToD = totalCapacityUpToD - mandatoryRemainingByD
 *
 * Если freeHoursUpToD < 0 -> ты уже “не успеваешь” по обязательным.
 */

const KEY = "tm_v02_state";

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function todayISO(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
function addDaysISO(iso, n){
  const d = new Date(iso+"T00:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function fmtDayTitle(iso){
  const d = new Date(iso+"T00:00:00");
  const day = d.toLocaleDateString(undefined, { weekday:"long" });
  const date = d.toLocaleDateString(undefined, { month:"short", day:"2-digit" });
  return { day: day[0].toUpperCase()+day.slice(1), date };
}
function clamp(x,a,b){ return Math.max(a, Math.min(b,x)); }
function round2(x){ return Math.round(x*100)/100; }
function hoursLabel(x){
  // красивый вывод типа 1h30m
  const sign = x < 0 ? "-" : "";
  x = Math.abs(x);
  const h = Math.floor(x);
  const m = Math.round((x - h)*60);
  if(h===0 && m===0) return "0h";
  if(m===0) return `${sign}${h}h`;
  if(h===0) return `${sign}${m}m`;
  return `${sign}${h}h${String(m).padStart(2,"0")}m`;
}

function uid(){
  return Math.random().toString(16).slice(2) + Date.now().toString(16);
}

function loadState(){
  const raw = localStorage.getItem(KEY);
  if(raw){
    try { return JSON.parse(raw); } catch(e){}
  }
  // seed demo
  const t = todayISO();
  const seed = {
    rangeDays: 14,
    defaultCap: 3,
    capOverrides: {}, // { "YYYY-MM-DD": number }
    tasks: [
      { id: uid(), title:"Do a homework", due:addDaysISO(t,0), req:2, done:0.5, tag:"Homework", type:"mandatory", desc:"ДЗ по математике / физике" },
      { id: uid(), title:"Attend a meeting", due:addDaysISO(t,1), req:3, done:1, tag:"Meeting Notes", type:"mandatory", desc:"Подготовить повестку" },
      { id: uid(), title:"Work on project", due:addDaysISO(t,2), req:4, done:1, tag:"Project Plan", type:"mandatory", desc:"Наметить этапы" },
      { id: uid(), title:"Read a book", due:addDaysISO(t,3), req:2, done:0, tag:"Book Title", type:"optional", desc:"Кратко законспектировать главы" },
      { id: uid(), title:"Practice coding", due:addDaysISO(t,4), req:3, done:1, tag:"Coding Challenge", type:"optional", desc:"Решить 2-3 задачки" },
    ],
    ui: {
      sort: "due",        // due | title | slack
      filter: "all",      // all | mandatory | optional
    }
  };
  localStorage.setItem(KEY, JSON.stringify(seed));
  return seed;
}

function saveState(){
  localStorage.setItem(KEY, JSON.stringify(state));
}

let state = loadState();

function capacityForDay(iso){
  const v = state.capOverrides?.[iso];
  return (typeof v === "number" && !Number.isNaN(v)) ? v : state.defaultCap;
}

function taskRemaining(task){
  return Math.max(0, Number(task.req||0) - Number(task.done||0));
}

function mandatoryRemainingBy(iso){
  const D = new Date(iso+"T00:00:00").getTime();
  return state.tasks
    .filter(t => t.type==="mandatory")
    .filter(t => new Date(t.due+"T00:00:00").getTime() <= D)
    .reduce((s,t)=> s + taskRemaining(t), 0);
}

function totalCapacityUpTo(iso, startIso){
  const start = new Date(startIso+"T00:00:00");
  const end = new Date(iso+"T00:00:00");
  let sum = 0;
  for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
    const x = d.toISOString().slice(0,10);
    sum += capacityForDay(x);
  }
  return sum;
}

function computeSlackUpTo(iso, startIso){
  const cap = totalCapacityUpTo(iso, startIso);
  const rem = mandatoryRemainingBy(iso);
  return cap - rem;
}

function tasksForDay(iso){
  return state.tasks.filter(t => t.due === iso);
}

function getRangeDates(){
  const start = todayISO();
  const arr = [];
  for(let i=0;i<state.rangeDays;i++){
    arr.push(addDaysISO(start, i));
  }
  return { start, dates: arr };
}

/* Sorting & filtering for cards in each day */
function filteredTasks(list){
  if(state.ui.filter === "mandatory") list = list.filter(t=>t.type==="mandatory");
  if(state.ui.filter === "optional") list = list.filter(t=>t.type==="optional");

  if(state.ui.sort === "title"){
    list = [...list].sort((a,b)=> (a.title||"").localeCompare(b.title||""));
  } else if(state.ui.sort === "due"){
    list = [...list].sort((a,b)=> (a.due||"").localeCompare(b.due||""));
  } else if(state.ui.sort === "slack"){
    // tasks with bigger remaining first
    list = [...list].sort((a,b)=> taskRemaining(b) - taskRemaining(a));
  }
  return list;
}

/* Render */
function render(){
  $("#rangeLabel").textContent = `${state.rangeDays}d`;

  const board = $("#board");
  board.innerHTML = "";

  const { start, dates } = getRangeDates();

  dates.forEach((iso, idx)=>{
    const { day, date } = fmtDayTitle(iso);

    const capToday = capacityForDay(iso);
    const remByD = mandatoryRemainingBy(iso);
    const capUpToD = totalCapacityUpTo(iso, start);
    const freeUpToD = capUpToD - remByD;

    const freeBadge =
      freeUpToD < 0 ? { cls:"warn", text:`${hoursLabel(freeUpToD)} slack` } :
      freeUpToD < capToday*0.5 ? { cls:"neutral", text:`${hoursLabel(freeUpToD)} slack` } :
      { cls:"good", text:`${hoursLabel(freeUpToD)} slack` };

    const meterPct = capUpToD <= 0 ? 0 : clamp((capUpToD - Math.max(freeUpToD,0))/capUpToD, 0, 1) * 100;
    // meter показывает "сколько из capacity съедено обязательными к этой дате"
    // если free<0, meter будет 100%
    const meterPctSafe = (freeUpToD < 0) ? 100 : meterPct;

    const col = document.createElement("div");
    col.className = "col";
    col.dataset.date = iso;

    col.innerHTML = `
      <div class="colHeader">
        <div class="accent"></div>
        <div class="dayName">${day}</div>
        <div class="dayDate">${date}</div>
        <button class="plusBtn" title="Add task" data-add="${iso}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="rgba(255,255,255,.78)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="summary">
        <div class="meterRow">
          <div class="meter"><i style="width:${meterPctSafe.toFixed(0)}%"></i></div>
          <div class="stat mono">${hoursLabel(remByD)} / ${hoursLabel(capUpToD)}</div>
        </div>

        <div class="summaryLine">
          <span class="badge ${freeBadge.cls}">${freeBadge.text}</span>
          <span class="badge gray">Cap today: <span class="mono">${hoursLabel(capToday)}</span></span>
          <span class="badge gray">Mandatory left: <span class="mono">${hoursLabel(remByD)}</span></span>
        </div>
      </div>

      <div class="cards"></div>
    `;

    const cards = $(".cards", col);
    let list = tasksForDay(iso);
    list = filteredTasks(list);

    if(list.length === 0){
      const empty = document.createElement("div");
      empty.className = "card";
      empty.style.opacity = ".55";
      empty.innerHTML = `
        <div class="cardTop">
          <div>
            <div class="cardTitle">No tasks</div>
            <div class="desc">Нажми “+” чтобы добавить задачу на этот день.</div>
          </div>
          <div class="cardMeta mono">${hoursLabel(capToday)}</div>
        </div>
        <div class="miniBar"><i style="width:0%"></i></div>
        <div class="tagRow">
          <span class="tag gray">free day</span>
        </div>
      `;
      cards.appendChild(empty);
    } else {
      list.forEach(task=>{
        const rem = taskRemaining(task);
        const pct = (Number(task.req||0) <= 0) ? 0 : clamp((Number(task.done||0)/Number(task.req||0)), 0, 1) * 100;
        const tagClass = task.type==="mandatory" ? "" : "blue";
        const typeLabel = task.type==="mandatory" ? "Mandatory" : "Optional";

        const c = document.createElement("div");
        c.className = "card";
        c.dataset.taskId = task.id;
        c.innerHTML = `
          <div class="cardTop">
            <div>
              <div class="cardTitle">${escapeHtml(task.title || "Untitled task")}</div>
            </div>
            <div class="cardMeta mono">${hoursLabel(Number(task.done||0))} / ${hoursLabel(Number(task.req||0))}</div>
          </div>

          <div class="miniBar"><i style="width:${pct.toFixed(0)}%"></i></div>

          <div class="tagRow">
            <span class="tag ${tagClass}">${escapeHtml(task.tag || typeLabel)}</span>
            <span class="tag gray">${typeLabel}</span>
            <span class="tag gray">Remain: <span class="mono">${hoursLabel(rem)}</span></span>
          </div>

          <div class="desc">${escapeHtml(task.desc || "")}</div>

          <div class="actions">
            <button class="btn icon" data-edit="${task.id}" title="Edit">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M4 20h4l10.5-10.5a2 2 0 0 0 0-3L16 3.5a2 2 0 0 0-3 0L2.5 14V18a2 2 0 0 0 2 2Z"
                      stroke="rgba(255,255,255,.75)" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M12.5 5.5 18.5 11.5" stroke="rgba(255,255,255,.55)" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </button>

            <button class="btn danger" data-del="${task.id}">Delete</button>

            <button class="btn" data-plus="${task.id}">+0.5h</button>
            <button class="btn" data-minus="${task.id}">-0.5h</button>
          </div>

          <input class="range" data-range="${task.id}" type="range"
                 min="0" max="${Number(task.req||0)}" step="0.25" value="${Number(task.done||0)}" />
        `;
        cards.appendChild(c);
      });
    }

    board.appendChild(col);
  });

  wireBoardEvents();
}

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* Events */
let boardWired = false;
function wireBoardEvents(){
  if(boardWired) return;
  boardWired = true;

  $("#board").addEventListener("click", (e)=>{
    const add = e.target.closest("[data-add]");
    if(add){
      openTaskModal({ mode:"add", presetDue: add.dataset.add });
      return;
    }
    const del = e.target.closest("[data-del]");
    if(del){
      const id = del.dataset.del;
      state.tasks = state.tasks.filter(t=>t.id !== id);
      saveState(); render();
      return;
    }
    const edit = e.target.closest("[data-edit]");
    if(edit){
      const id = edit.dataset.edit;
      const t = state.tasks.find(x=>x.id===id);
      if(t) openTaskModal({ mode:"edit", task: t });
      return;
    }
    const plus = e.target.closest("[data-plus]");
    if(plus){
      const id = plus.dataset.plus;
      const t = state.tasks.find(x=>x.id===id);
      if(t){
        t.done = round2(Math.min(Number(t.req||0), Number(t.done||0) + 0.5));
        saveState(); render();
      }
      return;
    }
    const minus = e.target.closest("[data-minus]");
    if(minus){
      const id = minus.dataset.minus;
      const t = state.tasks.find(x=>x.id===id);
      if(t){
        t.done = round2(Math.max(0, Number(t.done||0) - 0.5));
        saveState(); render();
      }
      return;
    }
  });

  $("#board").addEventListener("input", (e)=>{
    const r = e.target.closest("[data-range]");
    if(r){
      const id = r.dataset.range;
      const t = state.tasks.find(x=>x.id===id);
      if(t){
        t.done = round2(Number(r.value));
        saveState(); // не перерисовываем на каждый пиксель
      }
    }
  });

  $("#board").addEventListener("change", (e)=>{
    const r = e.target.closest("[data-range]");
    if(r){
      // финальный ререндер чтобы обновить проценты/лейблы
      render();
    }
  });
}

/* Top controls */
$("#btnSort").addEventListener("click", ()=>{
  const next =
    state.ui.sort === "due" ? "title" :
    state.ui.sort === "title" ? "slack" : "due";
  state.ui.sort = next;
  saveState(); render();
});

$("#btnFilters").addEventListener("click", ()=>{
  const next =
    state.ui.filter === "all" ? "mandatory" :
    state.ui.filter === "mandatory" ? "optional" : "all";
  state.ui.filter = next;
  saveState(); render();
});

$("#btnSettings").addEventListener("click", ()=> openSettings());

/* Tabs (визуально, пока только Columns) */
$("#tabRows").addEventListener("click", ()=> toast("Rows view — можно добавить позже (сейчас сделан Columns)."));
$("#tabTable").addEventListener("click", ()=> toast("Table view — можно добавить позже (сейчас сделан Columns)."));
$("#tabCols").addEventListener("click", ()=> { /* already */ });

/* Nav buttons */
$$(".navbtn").forEach(b=>{
  b.addEventListener("click", ()=>{
    $$(".navbtn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
  });
});

/* Simple toast */
let toastTimer = null;
function toast(msg){
  clearTimeout(toastTimer);
  let el = $("#toast");
  if(!el){
    el = document.createElement("div");
    el.id = "toast";
    el.style.position="fixed";
    el.style.left="50%";
    el.style.bottom="18px";
    el.style.transform="translateX(-50%)";
    el.style.padding="10px 12px";
    el.style.border="1px solid rgba(255,255,255,.12)";
    el.style.background="rgba(12,16,22,.92)";
    el.style.backdropFilter="blur(10px)";
    el.style.borderRadius="14px";
    el.style.boxShadow="0 18px 60px rgba(0,0,0,.55)";
    el.style.color="rgba(255,255,255,.9)";
    el.style.fontSize="13px";
    el.style.fontWeight="650";
    el.style.zIndex="9999";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity="1";
  toastTimer = setTimeout(()=>{ el.style.opacity="0"; }, 1600);
}

/* Task modal */
let modalMode = "add";
let editingId = null;

function openTaskModal({ mode, presetDue, task }){
  modalMode = mode;
  editingId = task?.id ?? null;

  $("#modalTitle").textContent = mode === "add" ? "Add task" : "Edit task";

  $("#fTitle").value = task?.title ?? "";
  $("#fDue").value = task?.due ?? presetDue ?? todayISO();
  $("#fReq").value = task?.req ?? 1.5;
  $("#fDone").value = task?.done ?? 0;
  $("#fTag").value = task?.tag ?? "";
  $("#fType").value = task?.type ?? "mandatory";
  $("#fDesc").value = task?.desc ?? "";

  $("#modalOverlay").style.display = "flex";
  setTimeout(()=> $("#fTitle").focus(), 0);
}

function closeTaskModal(){
  $("#modalOverlay").style.display = "none";
}

$("#modalClose").addEventListener("click", closeTaskModal);
$("#btnCancel").addEventListener("click", closeTaskModal);
$("#modalOverlay").addEventListener("click", (e)=>{
  if(e.target === $("#modalOverlay")) closeTaskModal();
});

$("#btnSave").addEventListener("click", ()=>{
  const title = $("#fTitle").value.trim();
  const due = $("#fDue").value;
  const req = Number($("#fReq").value);
  const done = Number($("#fDone").value);
  const tag = $("#fTag").value.trim();
  const type = $("#fType").value;
  const desc = $("#fDesc").value.trim();

  if(!title){ toast("Title is required"); return; }
  if(!due){ toast("Due date is required"); return; }
  if(req < 0 || Number.isNaN(req)){ toast("Required hours invalid"); return; }
  if(done < 0 || Number.isNaN(done)){ toast("Done hours invalid"); return; }

  const data = {
    id: editingId ?? uid(),
    title,
    due,
    req: round2(req),
    done: round2(Math.min(req, done)),
    tag,
    type,
    desc
  };

  if(modalMode === "add"){
    state.tasks.push(data);
  } else {
    const idx = state.tasks.findIndex(t=>t.id===editingId);
    if(idx >= 0) state.tasks[idx] = data;
  }

  saveState();
  closeTaskModal();
  render();
});

/* Settings modal */
function openSettings(){
  $("#sRange").value = state.rangeDays;
  $("#sDefaultCap").value = state.defaultCap;

  // overrides textarea
  const pairs = Object.entries(state.capOverrides || {})
    .sort((a,b)=> a[0].localeCompare(b[0]))
    .map(([k,v])=> `${k}=${v}`);
  $("#sOverrides").value = pairs.join(", ");

  $("#settingsOverlay").style.display = "flex";
}
function closeSettings(){
  $("#settingsOverlay").style.display = "none";
}
$("#settingsClose").addEventListener("click", closeSettings);
$("#sCancel").addEventListener("click", closeSettings);
$("#settingsOverlay").addEventListener("click", (e)=>{
  if(e.target === $("#settingsOverlay")) closeSettings();
});

$("#sSave").addEventListener("click", ()=>{
  const range = clamp(Number($("#sRange").value || 14), 7, 60);
  const defCap = Math.max(0, Number($("#sDefaultCap").value || 0));

  const raw = $("#sOverrides").value.trim();
  const overrides = {};
  if(raw){
    // accept "a=b, c=d" or lines
    const tokens = raw.split(/[\n,]+/).map(x=>x.trim()).filter(Boolean);
    tokens.forEach(tok=>{
      const m = tok.match(/^(\d{4}-\d{2}-\d{2})\s*=\s*([0-9]*\.?[0-9]+)$/);
      if(m){
        overrides[m[1]] = round2(Number(m[2]));
      }
    });
  }

  state.rangeDays = range;
  state.defaultCap = round2(defCap);
  state.capOverrides = overrides;

  saveState();
  closeSettings();
  render();
});

$("#sReset").addEventListener("click", ()=>{
  if(confirm("Сбросить все данные? (localStorage)")){
    localStorage.removeItem(KEY);
    state = loadState();
    closeSettings();
    render();
    toast("Reset done");
  }
});

/* Quick add via keyboard */
document.addEventListener("keydown", (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==="k"){
    e.preventDefault();
    openTaskModal({ mode:"add", presetDue: todayISO() });
  }
  if(e.key === "Escape"){
    if($("#modalOverlay").style.display==="flex") closeTaskModal();
    if($("#settingsOverlay").style.display==="flex") closeSettings();
  }
});

/* First render */
render();
toast("Ctrl/⌘ + K — quick add");
</script>
